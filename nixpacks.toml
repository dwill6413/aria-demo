[phases.setup]
nixPkgs = ["nodejs_22"]

# Use pnpm (matches pnpm-lock.yaml) — far faster than `npm install`, which did a
# full fresh resolution of the large Sui/Seal dependency tree every deploy and
# timed out Railway's build heartbeat. --frozen-lockfile installs exactly what
# the committed lockfile pins. We install pnpm via `npm install -g` rather than
# corepack: the corepack bundled with Node 22.11 ships stale signing keys and
# fails to verify newer pnpm versions ("Cannot find matching keyid").
[phases.install]
cmds = [
  "npm install -g pnpm@11.1.2",
  "pnpm install --frozen-lockfile",
]

[start]
cmd = "node server.mjs"
