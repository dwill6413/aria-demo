[phases.setup]
nixPkgs = ["nodejs_22"]

# Install deps with pnpm (matches pnpm-lock.yaml), run via `npx` — avoids
# corepack (Node 22.11's corepack has stale signing keys) and `npm install -g`
# (global bin not on PATH in the next build layer). Pin pnpm 10, NOT 11: the
# nixpacks nodejs_22 image is Node 22.11, and pnpm 11 requires Node >= 22.13.
# pnpm 10 reads the lockfileVersion 9.0 lockfile fine. --frozen-lockfile installs
# exactly what the committed lockfile pins (much faster than npm's fresh resolve).
[phases.install]
cmds = ["npx --yes pnpm@10 install --frozen-lockfile"]

[start]
cmd = "node server.mjs"
