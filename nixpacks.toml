[phases.setup]
nixPkgs = ["nodejs_22"]

# Use pnpm (matches pnpm-lock.yaml) — faster + reliable vs `npm install`, which
# did a full fresh resolution of the large Sui/Seal tree every deploy (and once
# timed out Railway's build heartbeat). Run pnpm via `npx` rather than corepack
# (Node 22.11's corepack ships stale signing keys → "Cannot find matching keyid")
# or `npm install -g` (global bin isn't on PATH in the next build layer →
# "pnpm: command not found"). npx fetches pnpm and runs it directly, in one step.
[phases.install]
cmds = ["npx --yes pnpm@11.1.2 install --frozen-lockfile"]

[start]
cmd = "node server.mjs"
